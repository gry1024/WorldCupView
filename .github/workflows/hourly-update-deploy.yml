name: Hourly data update and CloudBase deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.7.0"
  CLOUDBASE_CLOUD_PATH: "worldcupview"
  NEXT_PUBLIC_BASE_PATH: "/worldcupview"
  TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
  TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
  TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}

jobs:
  update-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update data
        run: pnpm update:data

      - name: Verify
        run: pnpm lint && pnpm test && pnpm build

      - name: Commit and push refreshed data
        run: |
          git config user.name "worldcupview-bot"
          git config user.email "worldcupview-bot@users.noreply.github.com"
          git add src/data/worldcup-data.json public/data/worldcup-data.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh world cup data [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Install CloudBase CLI
        if: ${{ env.TCB_SECRET_ID != '' && env.TCB_SECRET_KEY != '' && env.TCB_ENV_ID != '' }}
        run: npm install -g @cloudbase/cli

      - name: Login CloudBase
        if: ${{ env.TCB_SECRET_ID != '' && env.TCB_SECRET_KEY != '' && env.TCB_ENV_ID != '' }}
        run: tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY" -e "$TCB_ENV_ID"

      - name: Deploy to CloudBase static hosting
        if: ${{ env.TCB_SECRET_ID != '' && env.TCB_SECRET_KEY != '' && env.TCB_ENV_ID != '' }}
        run: tcb hosting deploy ./out "${{ env.CLOUDBASE_CLOUD_PATH }}" -e "$TCB_ENV_ID"
